name: Deploy site

# Deploys the marketing site (the `site/` workspace) to Cloudflare Pages.
#
#   * push to main      -> a preview deploy on the "staging" branch alias
#     (https://staging.<project>.pages.dev). Every merge refreshes staging.
#   * push a tag v1.2.3 -> a production deploy (the project's production branch
#     is "production"), served on the custom domain pattern-js.dev. Because the
#     build injects __VERSION__ from the root package.json at the tagged commit,
#     the live site's version badge always matches the released framework version.
#
# Requires two repo secrets: CLOUDFLARE_API_TOKEN (an account-scoped token with
# "Cloudflare Pages: Edit") and CLOUDFLARE_ACCOUNT_ID. Until they are set, the
# deploy step is skipped cleanly.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build the site
        run: pnpm build:site

      - name: Resolve target (production on tags, staging on main)
        id: target
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "branch=production" >> "$GITHUB_OUTPUT"
          else
            echo "branch=staging" >> "$GITHUB_OUTPUT"
          fi

      # Call Wrangler directly via `pnpm dlx` (isolated temp env) rather than
      # cloudflare/wrangler-action, whose auto-installer runs `pnpm add wrangler`
      # and fails on a pnpm workspace root (ERR_PNPM_ADDING_TO_ROOT). Wrangler
      # reads CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID from the env above.
      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: pnpm dlx wrangler@4 pages deploy site/dist --project-name=pattern-site --branch=${{ steps.target.outputs.branch }}
